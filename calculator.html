<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#1e1e1e;
}

/* CALCULATOR */

.calculator{
    background:#410b97;
    padding:25px;
    border-radius:20px;
    width:350px;
    box-shadow:0 0 20px rgba(225, 16, 16, 0.5);
}

/* DISPLAY */

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    margin-bottom:20px;
    border-radius:10px;
    padding:15px;
    font-size:32px;
    text-align:right;
    background:#d87db5;
    color:rgb(172, 212, 134);
}

/* BUTTONS GRID */

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:15px;
    <button class="operator" onclick="squareRoot()">√</button>
}

/* BUTTON STYLE */

button{
    height:65px;
    border:none;
    border-radius:12px;
    font-size:24px;
    cursor:pointer;
    transition:0.3s;
}

/* HOVER EFFECT */

button:hover{
    transform:scale(1.05);
}

/* NUMBER BUTTONS */

.number{
    background:#dfe21d;
    color:white;
}

/* OPERATOR BUTTONS */

.operator{
    background:#db310b;
    color:white;
}

/* CLEAR BUTTON */

.clear{
    background:rgb(22, 20, 20);
    color:white;
}

/* EQUAL BUTTON */

.equal{
    background:rgb(114, 4, 223);
    color:white;
}

/* RESPONSIVE */

@media(max-width:400px){

    .calculator{
        width:95%;
    }

    button{
        height:55px;
        font-size:20px;
    }

}

</style>
</head>

<body>

<div class="calculator">

    <!-- DISPLAY SCREEN -->

    <input type="text" id="display" readonly>

    <!-- BUTTONS -->

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>

        <button class="operator" onclick="appendValue('/')">÷</button>

        <button class="operator" onclick="squareRoot()">√</button>

        <button class="operator" onclick="appendValue('*')">×</button>

        <button class="operator" onclick="deleteLast()">⌫</button>

        <button class="number" onclick="appendValue('7')">7</button>

        <button class="number" onclick="appendValue('8')">8</button>

        <button class="number" onclick="appendValue('9')">9</button>

        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('4')">4</button>

        <button class="number" onclick="appendValue('5')">5</button>

        <button class="number" onclick="appendValue('6')">6</button>

        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('1')">1</button>

        <button class="number" onclick="appendValue('2')">2</button>

        <button class="number" onclick="appendValue('3')">3</button>

        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('0')">0</button>

        <button class="number" onclick="appendValue('.')">.</button>

    </div>

</div>

<script>

/* DISPLAY */

let display = document.getElementById("display");

/* ADD VALUES */

function appendValue(value){

    display.value += value;

}

/* CLEAR SCREEN */

function clearDisplay(){

    display.value = "";

}

/* DELETE LAST CHARACTER */

function deleteLast(){

    display.value = display.value.slice(0,-1);

}
function squareRoot(){

    try{

        display.value = Math.sqrt(display.value);

    }
    catch{

        display.value = "Error";

    }

}

/* CALCULATE RESULT */

function calculate(){

    try{

        display.value = eval(display.value);

    }
    catch{

        display.value = "Error";

    }

}

/* KEYBOARD SUPPORT */

document.addEventListener("keydown",(event)=>{

    let key = event.key;

    /* ALLOW NUMBERS */

    if(
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "."
    ){

        appendValue(key);

    }

    /* ENTER KEY */

    else if(key === "Enter"){

        calculate();

    }

    /* BACKSPACE */

    else if(key === "Backspace"){

        deleteLast();

    }

    /* ESC KEY */

    else if(key === "Escape"){

        clearDisplay();

    }

});

</script>

</body>
</html>
