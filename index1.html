<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Image Gallery</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f4eded;
      color:rgb(5, 2, 2);
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
      font-size:40px;
    }

    /* FILTER BUTTONS */

    .buttons{
      text-align:center;
      margin-bottom:30px;
    }
#noResult{
   text-align:center;
   color:red;
   font-size:22px;
   margin-bottom:20px;
   display:none;
}
    .buttons button{
      padding:10px 20px;
      margin:5px;
      border:none;
      background:#986b6b;
      color:rgb(6, 2, 2);
      cursor:pointer;
      border-radius:5px;
      transition:0.3s;
    }

    .buttons button:hover{
      background:#1e1302;
      transform:scale(1.05);
    }
    .search-box{
   display:flex;
   justify-content:center;
   margin-bottom:30px;
  <p id="noResult">No Results Found</p>
}

#searchDate{
   width:300px;
   padding:12px;
   border:none;
   border-radius:8px;
   font-size:16px;
   outline:none;
}
#noResult{
   text-align:center;
   color:#ff4d4d;
   font-size:20px;
   margin-bottom:20px;
   display:none;
}
    /* GALLERY */

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .image{
      overflow:hidden;
      border-radius:10px;
      position:relative;
    }

    .image img{
      width:100%;
      height:250px;
      object-fit:cover;
      cursor:pointer;
      transition:0.5s;
      border-radius:10px;
    }

    /* HOVER EFFECT */

    .image:hover img{
      transform:scale(1.1);
      filter:brightness(70%);
    }

    /* LIGHTBOX */

    .lightbox{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.9);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .lightbox img{
      width:80%;
      max-width:700px;
      border-radius:10px;
    }

    /* CLOSE BUTTON */

    .close{
      position:absolute;
      top:20px;
      right:30px;
      font-size:40px;
      color:white;
      cursor:pointer;
    }

    /* NEXT & PREV BUTTONS */

    .prev,
    .next{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:50px;
      color:white;
      cursor:pointer;
      padding:10px;
      user-select:none;
    }

    .prev{
      left:30px;
    }

    .next{
      right:30px;
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      h1{
        font-size:28px;
      }

      .lightbox img{
        width:95%;
      }

      .prev,
      .next{
        font-size:35px;
      }

    }

  </style>
</head>

<body>

  <h1>Image Gallery</h1>

  <!-- FILTER BUTTONS -->

  <div class="buttons">
    <button onclick="filterImages('all')">All</button>
    <button onclick="filterImages('nature')">Nature</button>
    <button onclick="filterImages('city')">City</button>
    <button onclick="filterImages('animals')">Animals</button>
    <button onclick="filterImages('Birds')">birds</button>
  </div>

  <!-- GALLERY -->
<div class="search-box">

   <input 
      type="text" 
      id="searchDate" 
      placeholder="Search by date..."
      onkeyup="searchImages()"

</div>
  <p id="noResult">No Results Found</p>
  <div class="gallery">

    <div class="image nature">
      <img src="https://picsum.photos/id/1015/600/400" alt="">
      <p class="date">7 May 2026</p>
    </div>

    <div class="image city">
      <img src="https://picsum.photos/id/1011/600/400" alt="">
      <p class="date">8 May 2026</p>
    </div>

    <div class="image animals">
      <img src="https://picsum.photos/id/1025/600/400" alt="">
      <p class="date">9 May 2026</p>
    </div>

    <div class="image nature">
      <img src="https://picsum.photos/id/1040/600/400" alt="">
      <p class="date">10 May 2026</p>
    </div>

    <div class="image Birds">
      <img src="https://birdcount.in/wp-content/uploads/2024/09/White-throated-Kingfisher-by-Hari-K-Patibanda.jpeg" alt="">
      <p class="date">3 May 2026</p>
    </div>


    <div class="image city">
      <img src="https://picsum.photos/id/1031/600/400" alt="">
      <p class="date">8 May 2026</p>
    </div>

    <div class="image animals">
      <img src="https://picsum.photos/id/1062/600/400" alt="">
      <p class="date">7 May 2026</p>
    </div>

    <div class="image Birds">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQxusEMXGTr_2QCLqvr_Ah9rmqIKYItNFWt3A&s" alt="">
      <p class="date">10 May 2026</p>
    </div>

  </div>

  <!-- LIGHTBOX -->

  <div class="lightbox" id="lightbox">

    <span class="close">&times;</span>

    <span class="prev">&#10094;</span>

    <img id="lightbox-img" src="">

    <span class="next">&#10095;</span>

  </div>

  <script>

    // GET ALL IMAGES

    const images = document.querySelectorAll(".gallery img");

    const lightbox = document.getElementById("lightbox");

    const lightboxImg = document.getElementById("lightbox-img");

    const closeBtn = document.querySelector(".close");

    const nextBtn = document.querySelector(".next");

    const prevBtn = document.querySelector(".prev");

    let currentIndex = 0;

    // OPEN LIGHTBOX

    images.forEach((img,index)=>{

      img.addEventListener("click",()=>{

        lightbox.style.display = "flex";

        lightboxImg.src = img.src;

        currentIndex = index;

      });

    });

    // CLOSE LIGHTBOX

    closeBtn.addEventListener("click",()=>{

      lightbox.style.display = "none";

    });

    // NEXT IMAGE

    nextBtn.addEventListener("click",()=>{

      currentIndex++;

      if(currentIndex >= images.length){
        currentIndex = 0;
      }

      lightboxImg.src = images[currentIndex].src;

    });

    // PREVIOUS IMAGE

    prevBtn.addEventListener("click",()=>{

      currentIndex--;

      if(currentIndex < 0){
        currentIndex = images.length - 1;
      }

      lightboxImg.src = images[currentIndex].src;

    });

    // FILTER FUNCTION

    function filterImages(category){

      const allImages = document.querySelectorAll(".image");

      allImages.forEach((item)=>{

        if(category === "all"){
          item.style.display = "block";
        }
        else if(item.classList.contains(category)){
          item.style.display = "block";
        }
        else{
          item.style.display = "none";
        }

      });

    }
    function searchImages(){

   let input = document
      .getElementById("searchDate")
      .value
      .toLowerCase();

   let allImages = document.querySelectorAll(".image");

   let found = false;

   // IF SEARCH BOX EMPTY
   // SHOW ALL IMAGES
   // HIDE MESSAGE

   if(input === ""){

      allImages.forEach((item)=>{

         item.style.display = "block";

      });

      document.getElementById("noResult").style.display = "none";

      return;

   }

   // SEARCH IMAGES

   allImages.forEach((item)=>{

      let date = item
         .querySelector(".date")
         .innerText
         .toLowerCase();

      if(date.includes(input)){

         item.style.display = "block";

         found = true;

      }
      else{

         item.style.display = "none";

      }

   });

   // SHOW OR HIDE MESSAGE

   if(found){

      document.getElementById("noResult").style.display = "none";

   }
   else{

      document.getElementById("noResult").style.display = "block";

   }

}
  </script>

</body>
</html>
